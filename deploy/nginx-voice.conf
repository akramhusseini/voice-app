# Place in /etc/nginx/sites-available/voice-app
# Then: sudo ln -s /etc/nginx/sites-available/voice-app /etc/nginx/sites-enabled/
#       sudo certbot --nginx -d jadeed.duckdns.org -d voice.jadeed.duckdns.org
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name voice.jadeed.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/jadeed.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jadeed.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://localhost:8445;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
